# vim: ts=4 sw=4 et smartindent:

# Use hyprviz (GUI app) to change settings
# Wiki: https://wiki.hyprland.org/Configuring/Variables

# FIX FOR CHROME/BRAVE BROWSERS: Check the "Use system title bar and borders"

# Imports
source = ./plugins.conf
source = ./dispatch.conf

# name, resolution, position, scale, extras
# monitor = DP-1, 1920x1080@240, 0x0, 1, bitdepth, 10
monitor = DP-1, highrr, auto, 1

# https://wiki.hyprland.org/Configuring/Dwindle-Layout
dwindle {
    pseudotile = true
    force_split = 2
    preserve_split = true
}

general {
    gaps_in = 8
    gaps_out = 16
    resize_on_border = true
    layout = dwindle
    border_size = 4
    col.inactive_border = rgba(33333399)
    col.active_border = rgba(492A78FF)
    resize_corner = 0
    extend_border_grab_area = 20
    allow_tearing = false
}

decoration {
    blur {
        enabled = false
        size = 4
        ignore_opacity = true
        xray = true
    }

    shadow {
        range = 10
        color = rgba(A7CAFFFF)
        color_inactive = rgba(00000050)
        enabled = false
    }
    dim_inactive = false
    rounding = 8
    rounding_power = 4
    border_part_of_window = true
    active_opacity = 1
}

# Enable blur for the status bar
#blurls = waybar

# https://wiki.hyprland.org/Configuring/Animations/
animations {
    enabled = true

    # From https://easings.net/
    # bezier = name, X0, Y0, X1, Y1
    # Y0 is originally 1.56, but 1.26 looks better
    bezier = easeOutBack, 0.34, 1.26, 0.64, 1

    # animation = name, on/off, speed, curve, style
    animation = workspaces, 1, 3, easeOutBack, slide
    animation = windows, 1, 3, easeOutBack, slide
    animation = fade, 1, 3, easeOutBack
    animation = border, 0, 3, easeOutBack
    animation = borderangle, 0, 3, easeOutBack, loop
}

input {
    # hyprland doesn't use the keyboard settings from nix
    # except for the custom layouts
    kb_model = pc104
    kb_layout = us,rud
    kb_variant = dvorak,
    kb_options = grp:win_space_toggle,lv3:menu_switch

    repeat_rate = 70
    repeat_delay = 250
    sensitivity = -0.75
    accel_profile = flat
    follow_mouse = 2
    float_switch_override_focus = 0
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    disable_autoreload = true
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    on_focus_under_fullscreen = 2
    middle_click_paste = false
}

xwayland {
    force_zero_scaling = true
}

# https://wiki.hyprland.org/Configuring/Window-Rules/

# make all windows floting by default
windowrule = float on, match:class .*

# tiled or not and window allocation
windowrule = tile on, workspace 1 silent, match:class kitty
windowrule = tile on, workspace 2 silent, match:class firefox
windowrule = tile on, workspace 3 silent, size (monitor_w*0.97) (monitor_h*0.93), match:class vesktop
windowrule = tile on, workspace 4 silent, match:class spotify
windowrule = tile on, workspace 5, match:class obsidian
windowrule = tile off, workspace 5, match:class vlc
windowrule = tile off, workspace 5, match:class org.qbittorrent.qBittorrent
windowrule = tile on, match:class org.keepassxc.KeePassXC
windowrule = tile on, match:class io.github.timasoft.hyprviz

# opacity
windowrule = opacity 0.9, match:class ^(spotify)$
# windowrule = opacity 0.97, match:class ^(vesktop)$

# size
windowrule = size (monitor_w*0.6) (monitor_h*0.6), match:class org.pulseaudio.pavucontrol
windowrule = size (monitor_w*0.6) (monitor_h*0.6), match:class nemo
windowrule = size (monitor_w*0.6) (monitor_h*0.6), match:class mpv

